name: Trace Compare CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  trace-compare:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release

    - name: Test
      run: dotnet test --configuration Release --no-build

    - name: Compare Trace
      shell: pwsh
      run: |
        ./tools/trace/run-compare.ps1 `
          -Expected ./tools/trace/testdata/expected.trace.log `
          -Actual   ./tools/trace/testdata/actual.trace.log
